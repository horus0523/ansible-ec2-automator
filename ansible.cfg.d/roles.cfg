---
# ansible.cfg additions for roles path
# This extends the existing ansible.cfg with role-specific settings

[defaults]
# Add roles directory to role path
roles_path = roles

# Enhanced output for CI
stdout_callback = yaml
bin_ansible_callbacks = true

# Inventory behavior
inventory = inventory/inventory.yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[connection]
# SSH optimization for EC2 instances
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
