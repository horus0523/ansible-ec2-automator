---
- name: Verify
  hosts: all
  gather_facts: false

  vars:
    ec2_provision_region: us-east-1
    ec2_provision_check_mode_skip: true

  pre_tasks:
    - name: Load role defaults for offline verification
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/roles/ec2_provision/defaults/main.yml"

    - name: Load role vars for offline verification
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/roles/ec2_provision/vars/main.yml"

  tasks:
    - name: Assert offline Molecule smoke inputs are loaded
      ansible.builtin.assert:
        that:
          - ec2_provision_region == 'us-east-1'
          - ec2_provision_instances | length > 0
          - ec2_provision_instances | map(attribute='name') | list | length == ec2_provision_instances | length
        fail_msg: "Offline Molecule smoke scenario did not load the role defaults/vars correctly."
        success_msg: "Offline Molecule smoke scenario validated role loading without real AWS calls."

    - name: Display offline Molecule verification results
      ansible.builtin.debug:
        msg: |
          Verification complete.
          Scenario mode: offline smoke.
          Role instances configured: {{ ec2_provision_instances | length }}
