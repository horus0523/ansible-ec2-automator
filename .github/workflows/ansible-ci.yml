name: Ansible CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: read

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ansible-lint molecule 'molecule-plugins[docker]'

      - name: Install Ansible collections
        run: ansible-galaxy collection install amazon.aws --force

      - name: Run ansible-lint
        run: ansible-lint --offline playbooks roles/ec2_provision molecule/default

      - name: Run playbook syntax checks
        run: |
          ansible-playbook --syntax-check playbooks/create_ec2_instances.yaml
          ansible-playbook --syntax-check playbooks/show_gathered_facts.yaml
          ansible-playbook --syntax-check playbooks/show_only_os_family_fact.yaml
          ansible-playbook --syntax-check playbooks/shutdown_debian_ec2_instances.yaml
          ansible-playbook --syntax-check playbooks/shutdown_redhat_ec2_instances.yaml

      - name: Run Molecule syntax validation
        run: molecule syntax
