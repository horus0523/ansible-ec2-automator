[defaults]

# Keep host verification enabled; first contact is accepted automatically.
host_key_checking = True

# Default inventory location
inventory = inventory/inventory.yaml

# Default private key file
private_key_file = files/ssh_keys/my-ansible-key.pem

# Improve output and performance
# Use default output (ansible.builtin.yaml is built-in since 2.13)
# stdout_callback = yaml
gathering = smart
fact_caching = memory

# Timeout settings
timeout = 30

[ssh_connection]
# SSH optimization
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=./.ansible/known_hosts
