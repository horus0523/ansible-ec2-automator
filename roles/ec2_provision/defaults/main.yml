---
# defaults file for ec2_provision role

# AWS region for EC2 instances
ec2_provision_region: us-east-1

# Default instance type
ec2_provision_instance_type: t2.micro

# Default security group name
ec2_provision_security_group: ansible-sg-ssh

# Default key pair name
ec2_provision_key_name: my-ansible-key

# Local bootstrap files
ec2_provision_vault_file: ../group_vars/all/pass.yml
ec2_provision_vault_example_file: ../group_vars/all/vault.example.yml
ec2_provision_private_key_file: ./files/ssh_keys/my-ansible-key.pem

# Basic validation rules
ec2_provision_ami_id_pattern: "^ami-[0-9a-f]{8,17}$"

# Default tags applied to all instances
ec2_provision_default_tags:
  ManagedBy: Ansible
  Project: EC2Automator

# SSH connection retry settings
ec2_provision_ssh_retries: 5
ec2_provision_ssh_delay: 30

# Check mode behavior
ec2_provision_check_mode_skip: "{{ ansible_check_mode | default(false) }}"
